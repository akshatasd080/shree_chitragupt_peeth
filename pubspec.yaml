name: shree_chitragupt_peeth
description: "Shree Chitragupt Peeth Official App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.7
  firebase_messaging: ^15.1.3

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  go_router: ^14.2.7

  cached_network_image: ^3.4.1
  youtube_player_flutter: ^9.1.3
  flutter_screenutil: ^5.9.3
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  razorpay_flutter: ^1.4.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/